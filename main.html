<!DOCTYPE html>

<html>

<head>
	<link rel="stylesheet" href="styles.css">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
	<!-- the entire body must be written by student -->
    <div class="container mt-5">
		<form class="needs-validation" novalidate>
			<div class="mb-3">
				<label  for="first-name-input" class="form-label">First Name</label>
				<input type="text" class="form-control" id="first-name-input" required>
				<div class="invalid-feedback">Please enter your first name.</div>
			</div>
			<div class="mb-3">
				<label  for="last-name-input" class="form-label">Last Name</label>
				<input type="text" class="form-control" id="last-name-input" required>
				<div class="invalid-feedback">Please enter your last name.</div>
			</div>
			<div class="mb-3">
				<label  for="email-input" class="form-label">Email Address</label>
				<input type="email" class="form-control" id="email-input" required>
				<div class="invalid-feedback">Please enter your email.</div>
			</div>
			<div class="mb-3">
				<label  for="college-input" class="form-label">College </label>
				<input type="text" class="form-control" id="college-input" required>
				<div class="invalid-feedback">Please enter your college name</div>
			</div>
			<div class="mb-3">
				<label  for="role-no-input" class="form-label">Roll No.</label>
				<input type="text" class="form-control" id="role-no-input" required>
				<div class="invalid-feedback">Please enter your role number.</div>
			</div>
			<div class="mb-3">
            <label for="grad-year-select" class="form-label">Graduation Year</label>
            <select id="grad-year-select" class="form-select" required>
                <option value="" selected disabled>Select Graduation Year</option>
                <option>2020</option>
                <option>2021</option>
                <option>2022</option>
                <option>2023</option>
            </select>
            <div class="invalid-feedback">
                Please select your graduation year.
            </div>
        </div>

        <div class="form-check mb-3">
            <input class="form-check-input" type="checkbox" id="conditions-checkbox" required>
            <label class="form-check-label" for="conditions-checkbox">
                Agree to the terms and conditions
            </label>
            <div class="invalid-feedback">
                You must agree before submitting.
            </div>
        </div>
        <button class="btn btn-primary" type="submit">Submit</button>
		</form>
		
	</div>
	<script type="text/javascript" src="./script.js">
</script>

</body>

</html>
